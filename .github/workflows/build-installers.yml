name: Build Installers

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  build-installers:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows installer
            os: windows-latest
            artifact: exodia-windows
          - name: Linux installer
            os: ubuntu-latest
            artifact: exodia-linux
          - name: macOS installer
            os: macos-latest
            artifact: exodia-macos

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Validate backend
        working-directory: backend
        run: |
          python -m ruff check .
          python -m mypy app
          python -m pytest

      - name: Build backend executable
        working-directory: backend
        shell: pwsh
        run: |
          python -m PyInstaller `
            --clean `
            --noconfirm `
            --onefile `
            --name exodia-backend `
            --collect-submodules app `
            app/desktop_entry.py

          $exeName = if ($IsWindows) { "exodia-backend.exe" } else { "exodia-backend" }
          $resourceDir = Join-Path $env:GITHUB_WORKSPACE "frontend/resources/backend"
          New-Item -ItemType Directory -Force -Path $resourceDir | Out-Null
          Copy-Item -LiteralPath (Join-Path "dist" $exeName) -Destination (Join-Path $resourceDir $exeName) -Force
          if (-not $IsWindows) {
            chmod +x (Join-Path $resourceDir $exeName)
          }

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build installer
        working-directory: frontend
        run: npm run electron:dist

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          if-no-files-found: error
          path: |
            frontend/release/*.exe
            frontend/release/*.zip
            frontend/release/*.dmg
            frontend/release/*.AppImage
            frontend/release/*.deb
            frontend/release/*.blockmap
