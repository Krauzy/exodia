services:
  backend:
    image: python:3.12-slim
    working_dir: /app/backend
    command: sh -c "pip install -e . && uvicorn app.main:app --host 0.0.0.0 --port 8765"
    ports:
      - "8765:8765"
    volumes:
      - .:/app
    environment:
      EXODIA_DATABASE_URL: sqlite:////app/backend/exodia.db
      EXODIA_ALLOWED_ORIGINS: '["http://localhost:5173","http://127.0.0.1:5173"]'

  frontend:
    image: node:22-alpine
    working_dir: /app/frontend
    command: sh -c "npm install && npm run dev:host"
    ports:
      - "5173:5173"
    volumes:
      - .:/app
    environment:
      VITE_API_BASE_URL: http://127.0.0.1:8765
    depends_on:
      - backend
